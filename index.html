<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The logbook</title>
  
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { background-color: #0F0F11; font-family: system-ui, -apple-system, sans-serif; }
    .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
    .leaflet-container { background: #0F0F11 !important; }
  </style>
</head>
<body class="text-gray-100 flex flex-col min-h-screen">

  <header class="bg-[#16161A] border-b border-[#222226] p-5 pt-8 sticky top-0 z-[1000] flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Adventure Log</h1>
      <p class="text-xs text-gray-400 mt-0.5">Field Notebook & Router</p>
    </div>
    <button id="btn-sync" onclick="syncWithCloud()" class="bg-emerald-700 text-white text-xs font-bold px-3 py-2 rounded-lg opacity-60">
      🔄 Sync Cloud (<span id="sync-count">0</span>)
    </button>
  </header>

  <main class="flex-1 p-4 pb-24 overflow-y-auto max-w-md mx-auto w-full">
    
    <div id="view-list" class="space-y-4">
      <input type="text" id="search-bar" placeholder="Search entries, tags, coordinates..." class="w-full bg-[#1C1C1E] text-white rounded-lg p-3 text-sm border border-[#2C2C2E] focus:outline-none focus:border-blue-500">
      <div id="entries-container" class="space-y-3"></div>
    </div>

    <div id="view-map" class="space-y-4 hidden h-full flex flex-col">
      <h2 class="text-lg font-bold">Tactical Map Plotting</h2>
      <div id="map" class="w-full h-96 rounded-xl border border-[#222226]"></div>
    </div>

    <div id="view-planner" class="space-y-4 hidden">
      <h2 class="text-lg font-bold">Transit & Route Planner</h2>
      
      <div class="bg-[#16161A] border border-[#222226] p-4 rounded-xl space-y-3">
        <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wider">Add Bus Route Reference</h3>
        <input type="text" id="plan-bus" placeholder="e.g. Victory Liner (Pasay to Baguio)" class="w-full bg-[#0F0F11] text-white rounded-lg p-2.5 text-sm border border-[#222226] focus:outline-none">
        
<div class="grid grid-cols-2 gap-2">
  <input type="text" id="plan-lat" placeholder="Station Lat (e.g. 16.4023)" class="w-full bg-[#0F0F11] text-white rounded-lg p-2.5 text-sm border border-[#222226] focus:outline-none">
  <input type="text" id="plan-lng" placeholder="Station Lng (e.g. 120.5963)" class="w-full bg-[#0F0F11] text-white rounded-lg p-2.5 text-sm border border-[#222226] focus:outline-none">
</div>


        <button type="button" onclick="getCurrentGPSLocationForPlanner()" class="w-full text-xs bg-neutral-800 hover:bg-neutral-700 text-gray-300 py-2 rounded-lg font-medium border border-[#222226]">
          📡 Auto-Query GPS to Station Fields
        </button>

        <div class="bg-[#0F0F11] border border-[#222226] p-3.5 rounded-xl space-y-3">
          <div class="flex justify-between items-center">
            <span class="text-xs font-bold text-blue-400 uppercase tracking-wider">Atmospheric Vector</span>
            <button type="button" onclick="fetchHourlyWeatherForecast()" class="text-[11px] bg-blue-600 hover:bg-blue-500 text-white font-bold px-3 py-1.5 rounded-lg transition">
              🌤️ Fetch Forecast
            </button>
          </div>
          <div id="weather-hourly-container" class="flex gap-2 overflow-x-auto pb-1 text-xs text-gray-400 hidden"></div>
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1 font-semibold">Attach Route Map/Schedule Picture</label>
          <input type="file" id="plan-img" accept="image/*" class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-neutral-800 file:text-gray-200">
        </div>

        <div>
          <label class="block text-xs text-gray-400 mb-1 font-semibold">Target Expedition/Transit Date</label>
          <input type="date" id="plan-date" class="w-full bg-[#0F0F11] text-white rounded-lg p-2.5 text-sm border border-[#222226] focus:outline-none">
        </div>

        <button type="button" id="btn-save-plan" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-sm transition">
          Save Transit Plan
        </button>
      </div>

      <div id="plans-container" class="space-y-3 pt-2"></div>
    </div>

    <div id="view-add" class="space-y-4 hidden">
      <h2 class="text-lg font-bold">Log Field Mission</h2>
      <div>
        <label class="block text-xs text-gray-400 mb-1 font-semibold">Mission Title</label>
        <input type="text" id="form-title" placeholder="e.g. Mt. Ulap Day Hike" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
      </div>
      <div class="grid grid-cols-2 gap-2">
        <input type="number" step="any" id="form-lat" placeholder="Latitude" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
        <input type="number" step="any" id="form-lng" placeholder="Longitude" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
      </div>
      
      <button type="button" onclick="getCurrentGPSLocationForLog()" class="w-full text-xs bg-neutral-800 hover:bg-neutral-700 text-gray-300 py-2.5 rounded-lg font-medium border border-[#222226]">
        📡 Query Local Phone GPS Coordinates
      </button>

      <div>
        <input type="text" id="form-location" placeholder="Location Name" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
      </div>

      <div>
        <label class="block text-xs text-gray-400 mb-1 font-semibold">Log Mission Date</label>
        <input type="date" id="form-date" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
      </div>

      <div>
        <input type="text" id="form-tags" placeholder="Tags (comma separated)" class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none">
      </div>
      <div>
        <textarea id="form-notes" rows="4" placeholder="Field Notes..." class="w-full bg-[#16161A] text-white rounded-lg p-3 border border-[#222226] focus:outline-none resize-none"></textarea>
      </div>
      <button type="button" id="btn-save-log" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold p-4 rounded-lg mt-2 transition">
        Save to Device Storage
      </button>
    </div>

    <div id="view-settings" class="space-y-4 hidden">
      <h2 class="text-lg font-bold">Data Ledger Tools</h2>
      <div class="bg-[#16161A] border border-[#222226] p-4 rounded-xl space-y-3">
        <button type="button" onclick="exportToJSONFile()" class="w-full bg-neutral-800 hover:bg-neutral-700 text-sm py-3 rounded-lg font-medium text-center block">
          📥 Backup Entire Journal (.json)
        </button>
        <label class="w-full bg-neutral-800 hover:bg-neutral-700 text-sm py-3 rounded-lg font-medium text-center block cursor-pointer">
          📤 Restore Journal Data From File
          <input type="file" id="import-file" accept=".json" class="hidden" onchange="importFromJSONFile(event)">
        </label>
      </div>
    </div>

    <div id="view-calendar" class="space-y-4 hidden">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold">Expedition Calendar</h2>
        <div class="flex items-center gap-2">
          <button type="button" onclick="changeMonth(-1)" class="bg-[#16161A] border border-[#222226] p-2 rounded-lg text-sm active:bg-neutral-800">◀</button>
          <span id="calendar-month-year" class="text-sm font-semibold text-blue-400"></span>
          <button type="button" onclick="changeMonth(1)" class="bg-[#16161A] border border-[#222226] p-2 rounded-lg text-sm active:bg-neutral-800">▶</button>
        </div>
      </div>
      
      <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-bold text-gray-500 uppercase tracking-wider">
        <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
      </div>
      
      <div id="calendar-grid" class="grid grid-cols-7 gap-1.5"></div>
    </div>

  </main>

  <div id="deep-view-modal" class="fixed inset-0 bg-[#0F0F11] z-[5000] hidden flex flex-col">
    <div class="bg-[#16161A] border-b border-[#222226] p-5 pt-8 flex justify-between items-center">
      <button type="button" onclick="closeDeepView()" class="text-sm bg-neutral-800 text-gray-300 px-4 py-2 rounded-lg font-semibold border border-[#222226]">← Back</button>
      <div id="modal-sync-badge"></div>
    </div>
    <div class="flex-1 p-6 overflow-y-auto space-y-6 max-w-md mx-auto w-full">
      <div>
        <span id="modal-date" class="text-xs text-blue-400 font-bold tracking-wider"></span>
        <h2 id="modal-title" class="text-3xl font-extrabold text-white mt-1 leading-tight"></h2>
        <p id="modal-location" class="text-sm text-gray-400 mt-2 flex items-center gap-1"></p>
      </div>
      <div id="modal-map-wrapper" class="hidden space-y-2">
        <div id="modal-mini-map" class="w-full h-44 rounded-xl border border-[#222226]"></div>
      </div>
      
      <div id="modal-image-wrapper" class="hidden space-y-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider block">Attached Route Map Reference</span>
        <img id="modal-img-display" class="w-full h-auto rounded-xl border border-[#222226] object-contain">
      </div>

      <div class="space-y-2">
        <div id="modal-notes" class="bg-[#16161A] border border-[#222226] p-4 rounded-xl text-gray-200 text-base leading-relaxed whitespace-pre-line"></div>
      </div>
      <div id="modal-tags" class="flex flex-wrap gap-2"></div>
      <button type="button" id="modal-delete-btn" class="w-full bg-red-950/30 text-red-500 font-bold p-3 rounded-lg border border-red-900/30 text-sm">Purge Document</button>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 h-16 bg-[#16161A] border-t border-[#222226] flex items-center justify-between px-2 z-[1000]">
    <button type="button" onclick="switchTab('list')" id="nav-list" class="flex flex-col items-center justify-center w-full h-full text-blue-500 font-semibold text-[10px] gap-0.5">
      <span class="text-base">📖</span><span>Log</span>
    </button>
    <button type="button" onclick="switchTab('map')" id="nav-map" class="flex flex-col items-center justify-center w-full h-full text-gray-400 text-[10px] gap-0.5">
      <span class="text-base">🗺️</span><span>Map</span>
    </button>
    <button type="button" onclick="switchTab('planner')" id="nav-planner" class="flex flex-col items-center justify-center w-full h-full text-gray-400 text-[10px] gap-0.5">
      <span class="text-base">🧳</span><span>Plans</span>
    </button>
    <button type="button" onclick="switchTab('add')" id="nav-add" class="flex flex-col items-center justify-center w-full h-full text-gray-400 text-[10px] gap-0.5">
      <span class="text-base">➕</span><span>New</span>
    </button>
    <button type="button" onclick="switchTab('calendar')" id="nav-calendar" class="flex flex-col items-center justify-center w-full h-full text-gray-400 text-[10px] gap-0.5">
      <span class="text-base">📅</span><span>Dates</span>
    </button>
    <button type="button" onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center justify-center w-full h-full text-gray-400 text-[10px] gap-0.5">
      <span class="text-base">⚙️</span><span>Data</span>
    </button>
  </nav>

  <script src="app.js"></script>
  <script src="planner.js"></script>
  <script src="journal.js"></script>
  <script src="calendar.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log("Offline Engine Operational"))
        .catch(err => console.error("Worker registration fault:", err));
    }
  </script>
</body>

</html>
